name: Sync from Gitee

on:
  # 支持手动触发同步
  workflow_dispatch:
    inputs:
      branch:
        description: "要同步的分支（默认 develop）"
        required: false
        default: "develop"
  # 支持定时同步（每天检查一次，降低同步频率）
  schedule:
    - cron: "0 0 * * *"

jobs:
  sync:
    name: Sync from Gitee
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'develop' }}
          fetch-depth: 0

      - name: Sync from Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_SYNC_TOKEN }}
        run: |
          # 配置 Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 添加 Gitee 远程仓库
          git remote add gitee https://oauth2:${GITEE_TOKEN}@gitee.com/lytjs/lytjs.git

          # 拉取 Gitee 最新代码
          git fetch gitee ${{ github.event.inputs.branch || 'develop' }}

          # 合并 Gitee 的变更（移除 --allow-unrelated-histories 避免代码覆盖风险）
          git merge gitee/${{ github.event.inputs.branch || 'develop' }} \
            --no-edit || {
              echo "::error::合并冲突，请手动解决"
              exit 1
            }

          # 推送到 GitHub
          git push origin ${{ github.event.inputs.branch || 'develop' }}

      - name: Sync main branch
        if: github.event_name == 'workflow_dispatch'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_SYNC_TOKEN }}
        run: |
          # 同步 main 分支
          git fetch gitee main
          git checkout main
          git merge gitee/main --no-edit || {
            echo "::error::main 分支合并冲突，请手动解决"
            exit 1
          }
          git push origin main
          git checkout ${{ github.event.inputs.branch || 'develop' }}
