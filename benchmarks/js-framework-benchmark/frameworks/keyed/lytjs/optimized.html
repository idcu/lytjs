<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LytJS v6.9.0 - 优化模式</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" />
  </head>
  <body>
    <div class="container">
      <div class="jumbotron">
        <div class="row">
          <div class="col-md-12">
            <h1>LytJS v6.9.0</h1>
            <p>优化模式 (Manual DOM) - 手动 DOM 优化实现</p>
          </div>
        </div>
        <div class="row">
          <div class="col-md-12">
            <div style="padding: 15px; background: #d9edf7; border-radius: 5px;">
              <strong>实现说明：</strong>
              <ul>
                <li>创建和追加：使用 DocumentFragment 一次性插入所有行</li>
                <li>更新：只更新需要更新的行，不做全量协调</li>
                <li>选择：直接修改 class，不触发全量重新渲染</li>
                <li>删除：直接从 DOM 中删除对应节点</li>
                <li>交换：直接操作 DOM 节点位置</li>
                <li>这个实现用于展示手动优化的理论极限性能</li>
              </ul>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-12">
            <div class="row">
              <div class="col-sm-4 smallpad">
                <button type="button" class="btn btn-primary btn-block" id="run">Create 1,000 rows</button>
              </div>
              <div class="col-sm-4 smallpad">
                <button type="button" class="btn btn-primary btn-block" id="runlots">Create 10,000 rows</button>
              </div>
              <div class="col-sm-4 smallpad">
                <button type="button" class="btn btn-primary btn-block" id="add">Append 1,000 rows</button>
              </div>
              <div class="col-sm-4 smallpad">
                <button type="button" class="btn btn-primary btn-block" id="update">Update every 10th row</button>
              </div>
              <div class="col-sm-4 smallpad">
                <button type="button" class="btn btn-primary btn-block" id="clear">Clear</button>
              </div>
              <div class="col-sm-4 smallpad">
                <button type="button" class="btn btn-primary btn-block" id="swaprows">Swap Rows</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <table class="table table-hover table-striped test-data">
        <tbody></tbody>
      </table>
      <span class="preloadicon glyphicon glyphicon-remove" aria-hidden="true"></span>
    </div>

    <script>
      const adjectives = ['pretty','large','big','small','tall','short','long','handsome','plain','quaint','clean','elegant','easy','angry','crazy','helpful','mushy','odd','unsightly','adorable','important','inexpensive','cheap','expensive','fancy'];
      const colours = ['red','yellow','blue','green','pink','brown','purple','brown','white','black','orange'];
      const nouns = ['table','chair','house','bbq','desk','car','pony','train','plane','bridge','sunglasses','tower','house','plant','bicycle','tree'];

      let _id = 1;
      function generateId() { return _id++; }
      function generateRandomString() {
        return adjectives[Math.floor(Math.random() * adjectives.length)] + ' ' + colours[Math.floor(Math.random() * colours.length)] + ' ' + nouns[Math.floor(Math.random() * nouns.length)];
      }

      let tbody;
      let data = [];
      let selectedId = undefined;

      function createRow(item) {
        const tr = document.createElement('tr');
        tr.setAttribute('data-id', item.id);
        tr.setAttribute('data-key', item.id);

        const td1 = document.createElement('td');
        td1.className = 'col-md-1';
        td1.textContent = item.id;

        const td2 = document.createElement('td');
        td2.className = 'col-md-4';
        const a1 = document.createElement('a');
        a1.textContent = item.label;
        a1.addEventListener('click', () => select(item.id));
        td2.appendChild(a1);

        const td3 = document.createElement('td');
        td3.className = 'col-md-1';
        const a2 = document.createElement('a');
        a2.addEventListener('click', () => remove(item.id));
        const span = document.createElement('span');
        span.className = 'glyphicon glyphicon-remove';
        span.setAttribute('aria-hidden', 'true');
        a2.appendChild(span);
        td3.appendChild(a2);

        const td4 = document.createElement('td');
        td4.className = 'col-md-6';

        tr.appendChild(td1);
        tr.appendChild(td2);
        tr.appendChild(td3);
        tr.appendChild(td4);
        return tr;
      }

      function updateRow(tr, item, selId) {
        if (tr.firstChild.textContent !== String(item.id)) tr.firstChild.textContent = item.id;
        const a = tr.children[1].firstChild;
        if (a.textContent !== item.label) a.textContent = item.label;
        if (selId === item.id) tr.classList.add('danger');
        else tr.classList.remove('danger');
        return tr;
      }

      function run() {
        data = [];
        const fragment = document.createDocumentFragment();
        for (let i = 0; i < 1000; i++) {
          const item = { id: generateId(), label: generateRandomString() };
          data.push(item);
          fragment.appendChild(createRow(item));
        }
        selectedId = undefined;
        while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
        tbody.appendChild(fragment);
      }

      function runLots() {
        data = [];
        const fragment = document.createDocumentFragment();
        for (let i = 0; i < 10000; i++) {
          const item = { id: generateId(), label: generateRandomString() };
          data.push(item);
          fragment.appendChild(createRow(item));
        }
        selectedId = undefined;
        while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
        tbody.appendChild(fragment);
      }

      function add() {
        const fragment = document.createDocumentFragment();
        for (let i = 0; i < 1000; i++) {
          const item = { id: generateId(), label: generateRandomString() };
          data.push(item);
          fragment.appendChild(createRow(item));
        }
        tbody.appendChild(fragment);
      }

      function update() {
        const rows = Array.from(tbody.children);
        for (let i = 0; i < data.length; i += 10) {
          data[i].label += ' !!!';
          if (rows[i]) updateRow(rows[i], data[i], selectedId);
        }
      }

      function clear() {
        data = [];
        selectedId = undefined;
        while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
      }

      function swapRows() {
        if (data.length > 998) {
          const temp = data[1];
          data[1] = data[998];
          data[998] = temp;
          const rows = Array.from(tbody.children);
          if (rows[1] && rows[998]) {
            const next1 = rows[1].nextSibling;
            if (next1 === rows[998]) {
              tbody.insertBefore(rows[998], rows[1]);
            } else {
              tbody.insertBefore(rows[1], rows[998]);
              if (next1) tbody.insertBefore(rows[998], next1);
              else tbody.appendChild(rows[998]);
            }
          }
        }
      }

      function remove(id) {
        const index = data.findIndex(item => item.id === id);
        if (index >= 0) {
          const rows = Array.from(tbody.children);
          if (rows[index]) tbody.removeChild(rows[index]);
          data.splice(index, 1);
        }
      }

      function select(id) {
        const oldId = selectedId;
        selectedId = id;
        const rows = Array.from(tbody.children);
        for (let i = 0; i < rows.length; i++) {
          const row = rows[i];
          const rowId = parseInt(row.getAttribute('data-id'));
          if (rowId === oldId) row.classList.remove('danger');
          if (rowId === id) row.classList.add('danger');
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        tbody = document.getElementsByTagName('tbody')[0];
        document.getElementById('run').addEventListener('click', run);
        document.getElementById('runlots').addEventListener('click', runLots);
        document.getElementById('add').addEventListener('click', add);
        document.getElementById('update').addEventListener('click', update);
        document.getElementById('clear').addEventListener('click', clear);
        document.getElementById('swaprows').addEventListener('click', swapRows);
      });
    </script>
  </body>
</html>
