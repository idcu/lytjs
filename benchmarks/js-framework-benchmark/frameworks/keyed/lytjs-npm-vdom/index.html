<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LytJS - VDOM Mode (npm package)</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="jumbotron">
        <div class="row">
          <div class="col-md-12">
            <h1>LytJS (npm, VDOM)</h1>
            <p>js-framework-benchmark Implementation - Virtual DOM Mode</p>
          </div>
        </div>
        <div class="row">
          <div class="col-md-12">
            <div class="row">
              <div class="col-sm-4 smallpad">
                <button type="button" class="btn btn-primary btn-block" id="run">Create 1,000 rows</button>
              </div>
              <div class="col-sm-4 smallpad">
                <button type="button" class="btn btn-primary btn-block" id="runlots">Create 10,000 rows</button>
              </div>
              <div class="col-sm-4 smallpad">
                <button type="button" class="btn btn-primary btn-block" id="add">Append 1,000 rows</button>
              </div>
              <div class="col-sm-4 smallpad">
                <button type="button" class="btn btn-primary btn-block" id="update">Update every 10th row</button>
              </div>
              <div class="col-sm-4 smallpad">
                <button type="button" class="btn btn-primary btn-block" id="clear">Clear</button>
              </div>
              <div class="col-sm-4 smallpad">
                <button type="button" class="btn btn-primary btn-block" id="swaprows">Swap Rows</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="app"></div>
      <span class="preloadicon glyphicon glyphicon-remove" aria-hidden="true"></span>
    </div>

    <script type="module">
      import { createApp, defineComponent, ref, h } from '@lytjs/core-vnode';

      const adjectives = ['pretty', 'large', 'big', 'small', 'tall', 'short', 'long', 'handsome', 'plain', 'quaint', 'clean', 'elegant', 'easy', 'angry', 'crazy', 'helpful', 'mushy', 'odd', 'unsightly', 'adorable', 'important', 'inexpensive', 'cheap', 'expensive', 'fancy'];
      const colours = ['red', 'yellow', 'blue', 'green', 'pink', 'brown', 'purple', 'brown', 'white', 'black', 'orange'];
      const nouns = ['table', 'chair', 'house', 'bbq', 'desk', 'car', 'pony', 'train', 'plane', 'bridge', 'sunglasses', 'tower', 'house', 'plant', 'bicycle', 'tree'];

      let _id = 1;
      function generateId() { return _id++; }
      function generateRandomString() {
        return adjectives[Math.floor(Math.random() * adjectives.length)] + ' ' + colours[Math.floor(Math.random() * colours.length)] + ' ' + nouns[Math.floor(Math.random() * nouns.length)];
      }

      const data = ref([]);
      const selectedId = ref(undefined);

      const App = defineComponent({
        setup() {
          return () => h('table', { class: 'table table-hover table-striped test-data' }, [
            h('tbody', {}, data.value.map(item => 
              h('tr', { 
                key: item.id,
                class: selectedId.value === item.id ? 'danger' : '',
                'data-key': String(item.id)
              }, [
                h('td', { class: 'col-md-1' }, String(item.id)),
                h('td', { class: 'col-md-4' }, [
                  h('a', { 
                    onClick: () => select(item.id) 
                  }, item.label)
                ]),
                h('td', { class: 'col-md-1' }, [
                  h('a', { 
                    onClick: () => remove(item.id) 
                  }, [
                    h('span', { 
                      class: 'glyphicon glyphicon-remove',
                      'aria-hidden': 'true'
                    })
                  ])
                ]),
                h('td', { class: 'col-md-6' })
              ])
            ))
          ]);
        }
      });

      function run() {
        const newData = [];
        for (let i = 0; i < 1000; i++) {
          newData.push({ id: generateId(), label: generateRandomString() });
        }
        data.value = newData;
        selectedId.value = undefined;
      }

      function runLots() {
        const newData = [];
        for (let i = 0; i < 10000; i++) {
          newData.push({ id: generateId(), label: generateRandomString() });
        }
        data.value = newData;
        selectedId.value = undefined;
      }

      function add() {
        const newItems = [];
        for (let i = 0; i < 1000; i++) {
          newItems.push({ id: generateId(), label: generateRandomString() });
        }
        data.value = [...data.value, ...newItems];
      }

      function update() {
        data.value = data.value.map((item, index) => {
          if (index % 10 === 0) {
            return { ...item, label: item.label + ' !!!' };
          }
          return item;
        });
      }

      function clear() {
        data.value = [];
        selectedId.value = undefined;
      }

      function swapRows() {
        if (data.value.length > 998) {
          const newData = [...data.value];
          const temp = newData[1];
          newData[1] = newData[998];
          newData[998] = temp;
          data.value = newData;
        }
      }

      function remove(id) {
        data.value = data.value.filter(item => item.id !== id);
      }

      function select(id) {
        selectedId.value = id;
      }

      (async () => {
        await createApp(App).mount('#app');
        
        document.getElementById('run').addEventListener('click', run);
        document.getElementById('runlots').addEventListener('click', runLots);
        document.getElementById('add').addEventListener('click', add);
        document.getElementById('update').addEventListener('click', update);
        document.getElementById('clear').addEventListener('click', clear);
        document.getElementById('swaprows').addEventListener('click', swapRows);
      })();
    </script>
  </body>
</html>
