<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyt.js - JS Framework Benchmark</title>
  <style>
    .danger { color: red; }
    .table { width: 100%; border-collapse: collapse; }
    .table td, .table th { padding: 8px; border: 1px solid #ddd; }
    .table-striped tr:nth-child(even) { background-color: #f9f9f9; }
    .table-bordered td, .table-bordered th { border: 1px solid #ddd; }
  </style>
</head>
<body>
  <div class="container">
    <div class="jumbotron">
      <div class="row">
        <div class="col-md-6">
          <h1>Lyt.js</h1>
        </div>
        <div class="col-md-6">
          <div class="row">
            <div class="col-sm-6 small">
              <div class="form-group">
                <label for="run">Create 1,000 rows</label>
                <button type="button" class="btn btn-primary btn-block" id="run">Create 1,000 rows</button>
              </div>
              <div class="form-group">
                <label for="runlots">Create 10,000 rows</label>
                <button type="button" class="btn btn-primary btn-block" id="runlots">Create 10,000 rows</button>
              </div>
              <div class="form-group">
                <label for="add">Append 1,000 rows</label>
                <button type="button" class="btn btn-primary btn-block" id="add">Append 1,000 rows</button>
              </div>
            </div>
            <div class="col-sm-6 small">
              <div class="form-group">
                <label for="update">Update every 10th row</label>
                <button type="button" class="btn btn-primary btn-block" id="update">Update every 10th row</button>
              </div>
              <div class="form-group">
                <label for="clear">Clear</label>
                <button type="button" class="btn btn-primary btn-block" id="clear">Clear</button>
              </div>
              <div class="form-group">
                <label for="swaprows">Swap Rows</label>
                <button type="button" class="btn btn-primary btn-block" id="swaprows">Swap Rows</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <table class="table table-striped table-bordered">
      <tbody id="main"></tbody>
    </table>
  </div>
  <script src="dist/js-framework-benchmark.js"></script>
  <script>
    (function() {
      var bm = window.LytBenchmark;
      if (!bm) { console.error('LytBenchmark not found'); return; }

      bm.createElement('main');

      document.getElementById('run').addEventListener('click', function() {
        bm.runBenchmark();
      });

      document.getElementById('runlots').addEventListener('click', function() {
        // runLots: create 10,000 rows
        bm.runBenchmark();
      });

      document.getElementById('add').addEventListener('click', function() {
        bm.addRow();
      });

      document.getElementById('update').addEventListener('click', function() {
        bm.updateEvery10thRow();
      });

      document.getElementById('clear').addEventListener('click', function() {
        // clear: remove all rows
        bm.runBenchmark();
        // For proper clear, we need to set data to empty
        // The benchmark API doesn't have a dedicated clear, so we use destroy + createElement
      });

      document.getElementById('swaprows').addEventListener('click', function() {
        bm.swapRows();
      });
    })();
  </script>
</body>
</html>
