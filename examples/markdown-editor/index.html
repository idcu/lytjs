<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyt.js Markdown 编辑器</title>
  <style>
    /* ========== 全局样式 ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ========== 顶部导航栏 ========== */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1.25rem;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }
    .navbar .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #89b4fa;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .navbar .logo span { color: #a6adc8; font-weight: 400; }
    .navbar-actions { display: flex; gap: 0.5rem; }
    .navbar-actions button {
      padding: 0.4rem 0.85rem;
      font-size: 0.8rem;
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .navbar-actions button:hover { background: #45475a; }
    .navbar-actions button.active { background: #89b4fa; color: #1e1e2e; border-color: #89b4fa; }

    /* ========== 工具栏 ========== */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.4rem 1rem;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .toolbar button {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: #a6adc8;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
      transition: all 0.15s;
    }
    .toolbar button:hover { background: #313244; color: #cdd6f4; }
    .toolbar button.active { background: #89b4fa; color: #1e1e2e; }
    .toolbar .separator {
      width: 1px;
      height: 1.25rem;
      background: #313244;
      margin: 0 0.25rem;
    }
    .toolbar .word-count {
      margin-left: auto;
      font-size: 0.75rem;
      color: #6c7086;
    }

    /* ========== 编辑器主体 ========== */
    .editor-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* 编辑面板 */
    .editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #313244;
      min-width: 0;
    }
    .pane-header {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #6c7086;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }
    .editor-pane textarea {
      flex: 1;
      padding: 1rem;
      background: #1e1e2e;
      color: #cdd6f4;
      border: none;
      outline: none;
      resize: none;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.9rem;
      line-height: 1.6;
      tab-size: 2;
    }
    .editor-pane textarea::placeholder { color: #585b70; }

    /* 预览面板 */
    .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }
    .preview-content {
      flex: 1;
      padding: 1.25rem;
      overflow-y: auto;
      line-height: 1.7;
    }

    /* ========== 预览样式 ========== */
    .preview-content h1 { font-size: 1.75rem; margin: 1rem 0 0.5rem; color: #89b4fa; border-bottom: 1px solid #313244; padding-bottom: 0.3rem; }
    .preview-content h2 { font-size: 1.4rem; margin: 0.8rem 0 0.4rem; color: #89b4fa; }
    .preview-content h3 { font-size: 1.15rem; margin: 0.6rem 0 0.3rem; color: #89b4fa; }
    .preview-content p { margin: 0.5rem 0; }
    .preview-content strong { color: #f9e2af; font-weight: 700; }
    .preview-content em { color: #cba6f7; font-style: italic; }
    .preview-content code {
      background: #313244;
      color: #a6e3a1;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: 'JetBrains Mono', monospace;
    }
    .preview-content pre {
      background: #11111b;
      border: 1px solid #313244;
      border-radius: 8px;
      padding: 1rem;
      margin: 0.75rem 0;
      overflow-x: auto;
    }
    .preview-content pre code {
      background: none;
      padding: 0;
      color: #cdd6f4;
    }
    .preview-content ul, .preview-content ol { margin: 0.5rem 0; padding-left: 1.5rem; }
    .preview-content li { margin: 0.25rem 0; }
    .preview-content li::marker { color: #89b4fa; }
    .preview-content blockquote {
      border-left: 3px solid #89b4fa;
      margin: 0.75rem 0;
      padding: 0.5rem 1rem;
      background: #181825;
      border-radius: 0 6px 6px 0;
      color: #a6adc8;
    }
    .preview-content hr {
      border: none;
      border-top: 1px solid #313244;
      margin: 1rem 0;
    }
    .preview-content a { color: #89b4fa; text-decoration: underline; }

    /* ========== 全屏模式 ========== */
    body.fullscreen .navbar,
    body.fullscreen .toolbar { display: none; }
    body.fullscreen .editor-pane { display: none; }
    body.fullscreen .preview-pane { flex: 1; }

    /* ========== 响应式 ========== */
    @media (max-width: 768px) {
      .editor-body { flex-direction: column; }
      .editor-pane { border-right: none; border-bottom: 1px solid #313244; }
      .editor-pane, .preview-pane { flex: 1; }
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <div class="navbar">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      Markdown 编辑器 <span>by Lyt.js</span>
    </div>
    <div class="navbar-actions">
      <button :class="{ active: viewMode === 'split' }" @click="setViewMode('split')">分屏</button>
      <button :class="{ active: viewMode === 'edit' }" @click="setViewMode('edit')">编辑</button>
      <button :class="{ active: viewMode === 'preview' }" @click="setViewMode('preview')">预览</button>
    </div>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <button @click="insertFormat('bold')" title="粗体 (Ctrl+B)"><b>B</b></button>
    <button @click="insertFormat('italic')" title="斜体 (Ctrl+I)"><i>I</i></button>
    <button @click="insertFormat('code')" title="行内代码">&lt;/&gt;</button>
    <div class="separator"></div>
    <button @click="insertFormat('h1')" title="一级标题">H1</button>
    <button @click="insertFormat('h2')" title="二级标题">H2</button>
    <button @click="insertFormat('h3')" title="三级标题">H3</button>
    <div class="separator"></div>
    <button @click="insertFormat('ul')" title="无序列表">&#8226;</button>
    <button @click="insertFormat('ol')" title="有序列表">1.</button>
    <button @click="insertFormat('quote')" title="引用">"</button>
    <div class="separator"></div>
    <button @click="insertFormat('codeblock')" title="代码块">{ }</button>
    <button @click="insertFormat('hr')" title="分割线">&#8213;</button>
    <span class="word-count">{{ wordCount }} 字</span>
  </div>

  <!-- 编辑器主体 -->
  <div class="editor-body">
    <!-- 编辑面板 -->
    <div class="editor-pane" v-if="viewMode !== 'preview'">
      <div class="pane-header">Markdown</div>
      <textarea
        v-model="content"
        placeholder="在此输入 Markdown 内容..."
        @keydown="handleKeydown"
      ></textarea>
    </div>

    <!-- 预览面板 -->
    <div class="preview-pane" v-if="viewMode !== 'edit'">
      <div class="pane-header">预览</div>
      <div class="preview-content" v-html="renderedHtml"></div>
    </div>
  </div>

  <script type="module">
    /**
     * Lyt.js Markdown 编辑器示例
     *
     * 展示的框架特性：
     * - createApp: 创建应用实例
     * - ref: 响应式引用
     * - computed: 计算属性（实时预览、字数统计）
     * - watchEffect: 副作用
     * - template: 模板语法（v-model, v-html, v-if, @click, @keydown）
     * - setup: 组合式 API
     */

    import { createApp, ref, computed, watchEffect } from 'https://cdn.jsdelivr.net/npm/@lytjs/core@5.0.0/+esm'

    // ========== 默认 Markdown 内容 ==========
    const DEFAULT_CONTENT = `# Lyt.js Markdown 编辑器

## 功能特性

这是一个使用 **Lyt.js** 构建的 Markdown 编辑器，支持以下功能：

- 实时预览
- 工具栏快捷插入
- 多种视图模式
- 键盘快捷键

## 代码示例

\`\`\`javascript
import { createApp, ref, computed } from '@lytjs/core'

const app = createApp({
  setup() {
    const count = ref(0)
    const double = computed(() => count.value * 2)
    return { count, double }
  }
})
\`\`\`

行内代码使用 \`backtick\` 包裹。

## 引用

> Lyt.js - 轻写轻跑，所见即代码。
> 零依赖超轻量前端框架。

---

## 列表

1. 第一步：安装 Lyt.js
2. 第二步：创建应用
3. 第三步：享受开发乐趣

### 更多功能

- **粗体文本** 和 *斜体文本*
- [链接示例](https://gitee.com/lytjs/lytjs)
- 支持 H1 ~ H3 标题

---

*开始编辑，体验实时预览吧！*
`

    // ========== Markdown 解析器 ==========
    /**
     * 简易 Markdown 解析器
     * 支持：标题、粗体、斜体、行内代码、代码块、列表、引用、分割线、链接
     */
    function parseMarkdown(md) {
      if (!md) return ''

      let html = md

      // 转义 HTML 特殊字符（保留后续替换）
      html = html.replace(/&/g, '&amp;')
      html = html.replace(/</g, '&lt;')
      html = html.replace(/>/g, '&gt;')

      // 代码块（先处理，避免内部被转换）
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        return `<pre><code>${code.trim()}</code></pre>`
      })

      // 行内代码
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>')

      // 标题
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>')
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>')
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>')

      // 粗体和斜体
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>')

      // 分割线
      html = html.replace(/^---$/gm, '<hr>')

      // 引用
      html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
      // 合并连续引用
      html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n')

      // 无序列表
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>')
      html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => `<ul>${match}</ul>`)

      // 有序列表
      html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>')

      // 链接
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')

      // 段落：将连续非标签行包裹为 <p>
      html = html.replace(/^(?!<[huplo]|<li|<hr|<pre|<code|<block)(.*\S.*)$/gm, '<p>$1</p>')

      // 清理多余空行
      html = html.replace(/\n{3,}/g, '\n\n')

      return html.trim()
    }

    // ========== 创建应用 ==========
    const app = createApp({
      setup() {
        // --- 响应式状态 ---
        const content = ref(DEFAULT_CONTENT)   // 编辑器内容
        const viewMode = ref('split')          // 视图模式：split / edit / preview

        // --- 计算属性 ---
        // 实时渲染 HTML
        const renderedHtml = computed(() => parseMarkdown(content.value))

        // 字数统计
        const wordCount = computed(() => {
          const text = content.value.replace(/\s/g, '')
          return text.length
        })

        // --- 方法 ---
        /** 切换视图模式 */
        function setViewMode(mode) {
          viewMode.value = mode
          // 全屏预览时切换 body class
          document.body.classList.toggle('fullscreen', mode === 'preview')
        }

        /** 在光标位置插入格式文本 */
        function insertFormat(type) {
          const textarea = document.querySelector('textarea')
          if (!textarea) return

          const start = textarea.selectionStart
          const end = textarea.selectionEnd
          const selected = content.value.substring(start, end)
          let before = '', after = '', newCursorOffset = 0

          switch (type) {
            case 'bold':
              before = '**'; after = '**'
              newCursorOffset = selected ? selected.length + 4 : 2
              break
            case 'italic':
              before = '*'; after = '*'
              newCursorOffset = selected ? selected.length + 2 : 1
              break
            case 'code':
              before = '`'; after = '`'
              newCursorOffset = selected ? selected.length + 2 : 1
              break
            case 'h1':
              before = '# '; after = ''
              newCursorOffset = before.length + (selected || '标题').length
              break
            case 'h2':
              before = '## '; after = ''
              newCursorOffset = before.length + (selected || '标题').length
              break
            case 'h3':
              before = '### '; after = ''
              newCursorOffset = before.length + (selected || '标题').length
              break
            case 'ul':
              before = '- '; after = ''
              newCursorOffset = before.length + (selected || '列表项').length
              break
            case 'ol':
              before = '1. '; after = ''
              newCursorOffset = before.length + (selected || '列表项').length
              break
            case 'quote':
              before = '> '; after = ''
              newCursorOffset = before.length + (selected || '引用内容').length
              break
            case 'codeblock':
              before = '```\n'; after = '\n```'
              newCursorOffset = before.length + (selected || 'code').length
              break
            case 'hr':
              before = '\n---\n'; after = ''
              newCursorOffset = before.length
              break
          }

          const newText = content.value.substring(0, start) + before + (selected || '') + after + content.value.substring(end)
          content.value = newText

          // 恢复光标位置
          const nextTick = () => {
            textarea.focus()
            const pos = start + before.length + (selected ? selected.length : 0)
            textarea.setSelectionRange(pos, pos)
          }
          requestAnimationFrame(nextTick)
        }

        /** 键盘快捷键处理 */
        function handleKeydown(e) {
          // Ctrl+B 粗体
          if (e.ctrlKey && e.key === 'b') {
            e.preventDefault()
            insertFormat('bold')
          }
          // Ctrl+I 斜体
          if (e.ctrlKey && e.key === 'i') {
            e.preventDefault()
            insertFormat('italic')
          }
          // Tab 缩进
          if (e.key === 'Tab') {
            e.preventDefault()
            const start = e.target.selectionStart
            const end = e.target.selectionEnd
            const newText = content.value.substring(0, start) + '  ' + content.value.substring(end)
            content.value = newText
            requestAnimationFrame(() => {
              e.target.selectionStart = e.target.selectionEnd = start + 2
            })
          }
        }

        return {
          content, viewMode, renderedHtml, wordCount,
          setViewMode, insertFormat, handleKeydown,
        }
      },
    })

    app.mount('body')
  </script>
</body>
</html>
