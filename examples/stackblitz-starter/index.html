<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyt.js Starter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 2rem; background: #f5f5f5; color: #333; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { color: #42b883; margin-bottom: 1rem; }
    .counter { display: flex; align-items: center; gap: 1rem; margin-top: 1rem; }
    .count { font-size: 2rem; font-weight: bold; min-width: 3rem; text-align: center; }
    button { padding: 0.5rem 1rem; font-size: 1rem; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer; }
    button:hover { background: #f0f0f0; }
    .info { margin-top: 2rem; padding: 1rem; background: white; border-radius: 8px; border: 1px solid #e0e0e0; }
    .info h3 { margin-bottom: 0.5rem; }
    .info code { background: #f0f0f0; padding: 0.2rem 0.4rem; border-radius: 3px; font-size: 0.9rem; }
    a { color: #42b883; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Lyt.js Starter</h1>
    <p>这是一个 Lyt.js 最小化示例项目，在 StackBlitz 中运行。</p>
    <div id="app"></div>
    <div class="info">
      <h3>📚 快速链接</h3>
      <ul>
        <li><a href="https://gitee.com/lytjs/lytjs" target="_blank">Gitee 仓库</a></li>
        <li><a href="https://gitee.com/lytjs/lytjs/blob/master/README.md" target="_blank">文档</a></li>
      </ul>
      <h3>🔧 技术栈</h3>
      <p>核心 8 包 gzip 总计仅 <code>~34KB</code></p>
    </div>
  </div>
  <script type="module">
    import { createApp, ref, computed } from '@lytjs/core'

    const app = createApp({
      setup() {
        const count = ref(0)
        const doubled = computed(() => count.value * 2)

        function increment() { count.value++ }
        function decrement() { count.value-- }
        function reset() { count.value = 0 }

        return { count, doubled, increment, decrement, reset }
      },
      template: `
        <div class="counter">
          <button @click="decrement">-1</button>
          <span class="count">{{ count }}</span>
          <button @click="increment">+1</button>
          <button @click="reset" style="margin-left: 0.5rem">重置</button>
        </div>
        <p style="margin-top: 0.5rem; color: #666;">{{ count }} x 2 = {{ doubled }}</p>
      `
    })

    app.mount('#app')
  </script>
</body>
</html>
