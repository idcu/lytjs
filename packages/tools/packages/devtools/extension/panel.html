<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LytJS DevTools Panel</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>LytJS DevTools</h1>
      <div class="tabs">
        <button class="tab active" data-tab="components">Components</button>
        <button class="tab" data-tab="signals">Signals</button>
        <button class="tab" data-tab="events">Events</button>
        <button class="tab" data-tab="timeline">Timeline</button>
      </div>
    </header>
    
    <main class="content">
      <!-- Components Tab -->
      <div id="components-tab" class="tab-content active">
        <div class="tree-view" id="component-tree">
          <p class="placeholder">No component data. Is LytJS installed?</p>
        </div>
        <div class="inspector" id="component-inspector">
          <p class="placeholder">Select a component to inspect</p>
        </div>
      </div>
      
      <!-- Signals Tab -->
      <div id="signals-tab" class="tab-content">
        <div class="list-view" id="signals-list">
          <p class="placeholder">No signals found</p>
        </div>
      </div>
      
      <!-- Events Tab -->
      <div id="events-tab" class="tab-content">
        <div class="controls">
          <button id="record-btn" class="btn">Start Recording</button>
          <button id="clear-btn" class="btn">Clear</button>
        </div>
        <div class="list-view" id="events-list">
          <p class="placeholder">No events recorded</p>
        </div>
      </div>
      
      <!-- Timeline Tab -->
      <div id="timeline-tab" class="tab-content">
        <div class="controls">
          <button id="snapshot-btn" class="btn">Take Snapshot</button>
          <button id="restore-btn" class="btn" disabled>Restore Selected</button>
        </div>
        <div class="timeline" id="timeline">
          <p class="placeholder">No snapshots available</p>
        </div>
      </div>
    </main>
  </div>
  <script src="panel.js"></script>
</body>
</html>
