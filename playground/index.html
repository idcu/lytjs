<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyt.js v6 Playground</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 2rem;
    }
    #app {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 2rem;
      color: #00d9ff;
    }
    .scenario-nav {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      justify-content: center;
    }
    .scenario-nav button {
      padding: 0.5rem 1rem;
      border: 1px solid #00d9ff;
      background: transparent;
      color: #00d9ff;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .scenario-nav button:hover,
    .scenario-nav button.active {
      background: #00d9ff;
      color: #1a1a2e;
    }
    .scenario-container {
      background: #16213e;
      border-radius: 8px;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>Lyt.js v6 Playground</h1>
    <nav class="scenario-nav" id="scenario-nav"></nav>
    <div class="scenario-container" id="scenario-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
